<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <title>Mini Hub de Temperaturas</title>
  <link rel="stylesheet" href="css.css" />
</head>

<template id="Templatecardcidade">
  <div class="Cardcidade">
    <h2 class="TituloCidade">
      São Gabriel
    </h2>
    <div class="row text-center">
      <div class="col-md-4 weather-info">
        Temperatura Atual:
        <br>
        <span class="Temperatura">
          27 °C
        </span>
      </div>
      <div class="col-md-4 weather-info">
        Umidade Relativa:
        <br>
        <span class="Umidade">
          4%
        </span>
      </div>
      <div class="col-md-4 weather-info">
        Velocidade do vento:
        <br>
        <span class="VelocidadeVento">
          1 m/s
        </span>
      </div>
    </div>
  </div>

</template>

<div class="container my-1">
  <div class="text-center mb-4 rounded border" id="HeaderPesquisa">

    <h2 class="fw-bold py-3">
      Qual cidade você gostaria de pesquisar?
    </h2>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <input type="text" class="form-control" placeholder="Digite uma cidade" />
      </div>
    </div>

    <button class="btn btn-dark mt-3 my-3 px-5">
      Pesquisar
    </button>

  </div>

  <div class="cards-scroll" id="ContainerdasCartas">




  </div>

</div>
</div>



</div>

<script src="javascript.js"></script>
</body>

</html>
